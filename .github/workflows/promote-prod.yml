name: Promote Staging to Prod

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type promote-to-prod to confirm this promotion"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  SOURCE_VALUES_FILE: environments/staging/values/clustersage-values.yaml
  TARGET_VALUES_FILE: environments/prod/values/clustersage-values.yaml

jobs:
  promote:
    name: Promote production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate manual confirmation
        shell: bash
        run: |
          set -euo pipefail
          CONFIRMATION="${{ github.event.inputs.confirmation }}"
          [ "${CONFIRMATION}" = "promote-to-prod" ] || {
            echo "Confirmation failed. You must type promote-to-prod exactly."
            exit 1
          }

      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Promote staging images to prod
        id: promote
        shell: bash
        run: |
          set -euo pipefail

          [ -f "${SOURCE_VALUES_FILE}" ] || { echo "Missing source values file: ${SOURCE_VALUES_FILE}"; exit 1; }
          [ -f "${TARGET_VALUES_FILE}" ] || { echo "Missing target values file: ${TARGET_VALUES_FILE}"; exit 1; }

          validate_digest() {
            local label="$1"
            local digest="$2"
            [[ -n "${digest}" ]] || { echo "${label} digest is empty"; exit 1; }
            [[ "${digest}" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "${label} digest is invalid: ${digest}"; exit 1; }
          }

          copy_image() {
            local source_path="$1"
            local target_path="$2"
            local label="$3"
            local repository
            local tag
            local digest

            repository=$(yq "${source_path}.repository // \"\"" "${SOURCE_VALUES_FILE}")
            tag=$(yq "${source_path}.tag // \"\"" "${SOURCE_VALUES_FILE}")
            digest=$(yq "${source_path}.digest // \"\"" "${SOURCE_VALUES_FILE}")

            [[ -n "${repository}" ]] || { echo "${label} repository is empty"; exit 1; }
            [[ -n "${tag}" ]] || { echo "${label} tag is empty"; exit 1; }
            validate_digest "${label}" "${digest}"

            REPOSITORY="${repository}" TAG="${tag}" DIGEST="${digest}" yq -i "${target_path}.repository = strenv(REPOSITORY) | ${target_path}.tag = strenv(TAG) | ${target_path}.digest = strenv(DIGEST)" "${TARGET_VALUES_FILE}"
          }

          copy_image '.frontend.image' '.frontend.image' 'frontend'
          copy_image '.backend.image' '.backend.image' 'backend'
          copy_image '.emailWorker.image' '.emailWorker.image' 'email worker'
          copy_image '.migrationJob.image' '.migrationJob.image' 'migration job'

          promoted_tag=$(yq '.backend.image.tag // ""' "${SOURCE_VALUES_FILE}")
          echo "promoted_tag=${promoted_tag}" >> "$GITHUB_OUTPUT"
          if git diff --quiet -- "${TARGET_VALUES_FILE}"; then
            echo "No production promotion change required."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          safe_tag=$(echo "${promoted_tag}" | tr -cd '[:alnum:]-')
          [ -n "${safe_tag}" ] || safe_tag="manual"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=promotion/prod-${safe_tag}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Create production promotion pull request
        if: steps.promote.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore(prod): promote image ${{ steps.promote.outputs.promoted_tag }}"
          branch: ${{ steps.promote.outputs.branch_name }}
          delete-branch: true
          title: "chore(prod): promote image ${{ steps.promote.outputs.promoted_tag }}"
          body: |
            This PR promotes the currently deployed staging artifact into production.

            Source values file:
            - `${{ env.SOURCE_VALUES_FILE }}`

            Target values file:
            - `${{ env.TARGET_VALUES_FILE }}`

            Promotion guarantees:
            - no rebuild
            - same repository
            - same tag
            - same digest
          add-paths: |
            ${{ env.TARGET_VALUES_FILE }}
